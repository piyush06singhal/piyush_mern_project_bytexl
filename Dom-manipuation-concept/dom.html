<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Webpage</title>
    <link rel="stylesheet" href="style.css">
    <script>
        function populateDiv() {

            const a = parseInt(document.getElementById('firstnumber').value);
            const b = parseInt(document.getElementById('secondnumber').value);
            const sum = parseInt(a) + parseInt(b);
            document.getElementById('finalSum').innerHTML = sum;

        }
    </script>
</head>

<body>
    <input type = "text" id = "firstnumber" placeholder = "enter the first number"> <br><br>
    <input type = "text" id = "secondnumber" placeholder = "enter the second number"> <br><br>
    <button onClick = "populateDiv()">Calculate the Sum </button> 
    <div id = "finalSum"> </div>
</body>
</html>
