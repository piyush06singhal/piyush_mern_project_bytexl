<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Food &amp; Groceries. Discover the best restaurants. Swiggy it!</title>
    <link rel="icon" href="https://media-assets.swiggy.com/portal/m/logo_192x192.png">
</head>

<body style="margin:0; font-family:Arial, sans-serif; background-color: orangered; overflow-x:hidden;">

    <div style="display:flex; justify-content:space-between; align-items:center; padding:28px 85px;">
        <div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/13/Swiggy_logo.png" width="130px">
        </div>
        <div style="display:flex; gap:42px; color:white; font-size:18px; font-weight:bold; margin-left:200px;">
            <div>Swiggy Corporate</div>
            <div>Partner with us</div>
        </div>
        <div style="display:flex; gap:18px;">
            <button style="background-color:transparent; color:white; border:1px solid white; border-radius:14px; padding:14px 28px; font-size:16px; font-weight:bold; cursor:pointer;">
                Get the App
            </button>
            <button style="background-color:black; color:white; border:none; border-radius:14px; padding:14px 34px; font-size:16px; font-weight:bold; cursor:pointer;">
                Sign in
            </button>
        </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
        <div>
            <img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/portal/testing/seo-home/Veggies_new.png" width="250px">
        </div>
        <div style="text-align:center; margin-top:-10px;">
            <h1 style="color:white; font-size:50px; line-height:72px; font-weight:bold; margin-bottom:32px; margin-top: -170px;">
                Order food & groceries. Discover
                best restaurants. Swiggy it!
            </h1>
            <div style="display:flex; justify-content:center; gap:18px;">
                <input type="text" placeholder="Enter your delivery location" style="width:300px; height:58px; border:none; border-radius:18px; padding-left:18px; font-size:17px; outline:none;">
                <input type="text" placeholder="Search for restaurant, item or more" style="width:420px; height:58px; border:none; border-radius:18px; padding-left:18px; font-size:17px; outline:none;">
            </div>
        </div>
        <div>
            <img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/portal/testing/seo-home/Sushi_replace.png" width="250px">
        </div>
    </div>

    <div style="display:flex; justify-content:center; gap:32px; margin-top:-175px; flex-wrap:wrap;">
        <div style="background-color: white; width:335px; border-radius:30px; overflow:hidden;">
            <img src="./ec86a309-9b06-48e2-9adc-35753f06bc0a_Food3BU.avif" width="335px">
        </div>
        <div style="background-color: white; width:335px; border-radius:30px; overflow:hidden;">
            <img src="./b5c57bbf-df54-4dad-95d1-62e3a7a8424d_IM3BU.avif" width="335px">
        </div>
        <div style="background-color: white; width:335px; border-radius:30px; overflow:hidden;">
            <img src="./b6d9b7ab-91c7-4f72-9bf2-fcd4ceec3537_DO3BU.avif" width="335px">
        </div>
    </div>
    
    <div style="height:60px;"></div>
</body>
</html>
