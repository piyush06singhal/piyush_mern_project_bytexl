<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <link rel="icon" type="image/jfif" href="download.jfif">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="left-section">
            <div class="left-content">
                <img src="download.jfif" alt="Facebook Logo" class="logo">
                <div class="hero-section">
                    <h1>Explore the things <br><span>you love.</span></h1>
                    <img src="HpEiFYDux5j.webp" alt="Banner Image" class="banner-image">
                </div>
            </div>
        </div>

        <div class="right-section">
            <div class="login-box">
                <h2>Log in to Facebook</h2>
                <form id="loginForm">
                    <div class="input-group">
                        <input type="text" id="email" placeholder="Email address or mobile number">
                        <small id="emailError"></small>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password">
                        <small id="passwordError"></small>
                    </div>

                    <button type="submit" class="login-btn">Log in</button>
                </form>

                <p class="forgot-password">Forgotten password?</p>
                <button class="create-btn">Create new account</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
